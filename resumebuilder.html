<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>HireReady AI Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
               <i class="fas fa-briefcase"></i>
               <span>HireReady<span style="color:#22e7e7;">AI</span></span> 
            </div>
            <div class="header-actions">
            <button id="previewBtn">
    <i class="fas fa-eye"></i> Resume Preview
</button>
                <button class="btn btn-primary" id="downloadBtn">
                    <i class="fas fa-download"></i> Download Resume
            </div>
        </header>

        <main class="main-content">
            <section class="form-section">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="personal"><i class="fas fa-user"></i> Personal</button>
                    <button class="tab-btn" data-tab="education"><i class="fas fa-graduation-cap"></i> Education</button>
                    <button class="tab-btn" data-tab="experience"><i class="fas fa-briefcase"></i> Experience</button>
                    <button class="tab-btn" data-tab="skills"><i class="fas fa-cogs"></i> Skills</button>
                    <button class="tab-btn" data-tab="projects"><i class="fas fa-project-diagram"></i> Projects</button>
                </div>

                <form id="cvForm">
                    <!-- Personal -->
                    <div class="tab-content active" id="personal">
                        <div class="form-card">
                            <h3><i class="fas fa-user-circle"></i> Personal Information</h3>
                            <div class="photo-upload">
                                <div class="photo-preview" id="photoPreview">
                                    <i class="fas fa-camera"></i>
                                    <span>Add Photo</span>
                                </div>
                                <input type="file" id="photoInput" accept="image/*">
                            </div>
                            <div class="form-grid">
                                <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" placeholder="John Doe" required></div>
                                <div class="form-group"><label>Professional Title *</label><input type="text" id="jobTitle" placeholder="Software Engineer" required></div>
                                <div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="john@example.com" required></div>
                                <div class="form-group"><label>Phone *</label><input type="tel" id="phone" placeholder="+1 234 567 8900" required></div>
                                <div class="form-group"><label>Location</label><input type="text" id="location" placeholder="City, Country"></div>
                                <div class="form-group"><label>LinkedIn</label><input type="url" id="linkedin" placeholder="linkedin.com/in/username"></div>
                                <div class="form-group"><label>Portfolio</label><input type="url" id="website" placeholder="www.yourwebsite.com"></div>
                                <div class="form-group"><label>GitHub</label><input type="url" id="github" placeholder="github.com/username"></div>
                            </div>
                            <div class="form-group"><label>Professional Summary</label><textarea id="summary" rows="4" placeholder="Brief summary of your background..."></textarea></div>
                        </div>
                    </div>

                    <!-- Education -->
                    <div class="tab-content" id="education">
                        <div class="form-card">
                            <h3><i class="fas fa-graduation-cap"></i> Education</h3>
                            <div id="educationList"></div>
                            <button type="button" class="btn btn-outline" id="addEducation"><i class="fas fa-plus"></i> Add Education</button>
                        </div>
                    </div>

                    <!-- Experience -->
                    <div class="tab-content" id="experience">
                        <div class="form-card">
                            <h3><i class="fas fa-briefcase"></i> Work Experience</h3>
                            <div id="experienceList"></div>
                            <button type="button" class="btn btn-outline" id="addExperience"><i class="fas fa-plus"></i> Add Experience</button>
                        </div>
                    </div>

                    <!-- Skills -->
                    <div class="tab-content" id="skills">
                        <div class="form-card">
                            <h3><i class="fas fa-cogs"></i> Skills</h3>
                            <div class="skills-category">
                                <label>Technical Skills</label>
                                <div class="tag-input-container">
                                    <div class="tag-input" id="technicalSkills"><input type="text" placeholder="Type and press Enter"></div>
                                </div>
                            </div>
                            <div class="skills-category">
                                <label>Soft Skills</label>
                                <div class="tag-input-container">
                                    <div class="tag-input" id="softSkills"><input type="text" placeholder="Type and press Enter"></div>
                                </div>
                            </div>
                            <div class="skills-category">
                                <label>Languages</label>
                                <div class="tag-input-container">
                                    <div class="tag-input" id="languages"><input type="text" placeholder="Type and press Enter"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Projects -->
                    <div class="tab-content" id="projects">
                        <div class="form-card">
                            <h3><i class="fas fa-project-diagram"></i> Projects</h3>
                            <div id="projectsList"></div>
                            <button type="button" class="btn btn-outline" id="addProject"><i class="fas fa-plus"></i> Add Project</button>
                        </div>
                    </div>
                </form>
            </section>

            <!-- Preview Section -->
            <section class="preview-section">
                <div class="preview-header">
                  <h2>Resume Preview</h2> 
                    <div class="template-selector">
                        <select id="templateSelect">
                            <option value="modern">Modern</option>
                            <option value="classic">Classic</option>
                            <option value="minimal">Minimal</option>
                        </select>
                    </div>
                </div>
                <div class="preview-container">
                    <div id="cvPreview" class="cv-preview modern"></div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
             <h2>Resume Preview</h2>  
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="cvPreviewModal" class="cv-preview"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
